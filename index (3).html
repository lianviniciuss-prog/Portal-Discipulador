<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#E8B923">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Discipuladores">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="manifest" href="manifest.json">
<title>Discipuladores app</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=Work+Sans:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<style>
  :root{
    --bg:#11150D;
    --panel:#1B2114;
    --panel-2:#222B18;
    --line:#3A4528;
    --line-soft:#2C351E;
    --gold:#E8B923;
    --gold-dim:#9C7E2C;
    --cream:#ECE6D6;
    --cream-dim:#9C9885;
    --red:#B8463A;
    --black-ribbon:#0A0A08;
    --font-display:'Oswald',sans-serif;
    --font-body:'Work Sans',sans-serif;
    --font-mono:'JetBrains Mono',monospace;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--bg);
    background-image:
      radial-gradient(circle at 50% 0%, rgba(232,185,35,0.05), transparent 55%);
    font-family:var(--font-body);
    color:var(--cream);
    min-height:100vh;
    display:flex;
    justify-content:center;
    padding:28px 12px;
  }
  .phone{
    width:100%;
    max-width:430px;
    min-height:780px;
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:26px;
    display:flex;
    flex-direction:column;
    overflow:hidden;
    box-shadow:0 40px 80px -40px rgba(0,0,0,0.7);
  }
  @media (max-width: 600px){
    body{padding:0;}
    .phone{
      max-width:100%;
      min-height:100vh;
      height:100vh;
      border:none;
      border-radius:0;
      box-shadow:none;
    }
  }

  /* ---------- header ---------- */
  .header{
    padding:20px 20px 16px;
    background:linear-gradient(180deg,var(--panel-2),var(--panel));
    border-bottom:1px solid var(--line);
    display:flex;
    align-items:center;
    gap:14px;
  }
  .emblem{flex:0 0 auto;}
  .header-text{flex:1 1 auto;min-width:0;}
  .eyebrow{
    font-family:var(--font-mono);
    font-size:10px;
    letter-spacing:.22em;
    color:var(--gold-dim);
    text-transform:uppercase;
  }
  .title{
    font-family:var(--font-display);
    font-size:21px;
    letter-spacing:.06em;
    text-transform:uppercase;
    color:var(--cream);
    margin-top:3px;
    line-height:1.15;
  }
  .subtitle{
    font-family:var(--font-mono);
    font-size:10px;
    color:var(--cream-dim);
    margin-top:4px;
    letter-spacing:.05em;
  }

  /* ---------- view ---------- */
  .view{
    flex:1;
    overflow-y:auto;
    padding:18px 18px 14px;
  }
  .section-label{
    font-family:var(--font-mono);
    font-size:10px;
    letter-spacing:.2em;
    text-transform:uppercase;
    color:var(--gold-dim);
    margin:22px 0 10px;
    display:flex;
    align-items:center;
    gap:8px;
  }
  .section-label:first-child{margin-top:0;}
  .section-label::after{
    content:'';
    flex:1;
    height:1px;
    background:var(--line);
  }

  /* ---------- cards ---------- */
  .card{
    background:var(--panel-2);
    border:1px solid var(--line);
    border-radius:14px;
    padding:16px;
  }
  .card + .card{margin-top:12px;}

  /* ---------- selector ---------- */
  select, input, button{
    font-family:var(--font-body);
    font-size:14px;
  }
  .field{
    width:100%;
    background:var(--panel);
    border:1px solid var(--line);
    color:var(--cream);
    border-radius:10px;
    padding:10px 12px;
    appearance:none;
  }
  .field:focus{outline:2px solid var(--gold-dim);outline-offset:1px;}
  label.field-label{
    font-family:var(--font-mono);
    font-size:10px;
    letter-spacing:.15em;
    text-transform:uppercase;
    color:var(--cream-dim);
    display:block;
    margin-bottom:6px;
  }

  /* ---------- dossier ---------- */
  .dossier-top{display:flex;align-items:center;gap:14px;}
  .avatar{
    width:58px;height:58px;border-radius:50%;
    flex:0 0 auto;
    display:flex;align-items:center;justify-content:center;
    font-family:var(--font-display);font-size:18px;letter-spacing:.04em;
    background:var(--panel);border:1px solid var(--gold-dim);
    color:var(--gold);
  }
  .avatar.sm{width:40px;height:40px;font-size:13px;}
  .dossier-name{
    font-family:var(--font-display);
    font-size:18px;
    letter-spacing:.03em;
    text-transform:uppercase;
    color:var(--cream);
    line-height:1.2;
  }
  .dossier-meta{
    font-family:var(--font-mono);
    font-size:11px;
    color:var(--cream-dim);
    margin-top:4px;
    line-height:1.5;
  }
  .chip-row{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px;}
  .chip{
    font-family:var(--font-mono);
    font-size:10px;
    letter-spacing:.08em;
    text-transform:uppercase;
    color:var(--cream-dim);
    border:1px solid var(--line);
    border-radius:20px;
    padding:3px 10px;
  }

  /* ---------- ribbon (rank) ---------- */
  .ribbon-block{margin-top:16px;}
  .ribbon-head{
    display:flex;justify-content:space-between;align-items:baseline;
    margin-bottom:7px;
  }
  .ribbon-rank{
    font-family:var(--font-display);
    font-size:14px;letter-spacing:.08em;text-transform:uppercase;color:var(--gold);
  }
  .ribbon-desc{
    font-family:var(--font-mono);font-size:10px;color:var(--cream-dim);
  }
  .ribbon{display:flex;gap:3px;height:11px;}
  .ribbon-seg{
    flex:1;border-radius:2px;background:var(--black-ribbon);
    border:1px solid var(--line);
    position:relative;
  }
  .ribbon-seg.filled{
    background:var(--gold);border-color:var(--gold-dim);
  }
  .ribbon-seg.star::after{
    content:'★';position:absolute;inset:0;
    display:flex;align-items:center;justify-content:center;
    font-size:8px;color:var(--black-ribbon);line-height:1;
  }

  /* ---------- frequency gauge ---------- */
  .gauge-block{margin-top:14px;}
  .gauge-head{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:6px;}
  .gauge-label{font-family:var(--font-mono);font-size:10px;letter-spacing:.15em;text-transform:uppercase;color:var(--cream-dim);}
  .gauge-value{font-family:var(--font-display);font-size:16px;color:var(--cream);}
  .gauge-track{height:8px;border-radius:5px;background:var(--panel);border:1px solid var(--line);overflow:hidden;}
  .gauge-fill{height:100%;background:var(--gold);border-radius:5px 0 0 5px;}
  .gauge-note{font-family:var(--font-mono);font-size:10px;color:var(--cream-dim);margin-top:6px;}

  /* ---------- patches (broches) ---------- */
  .patch-grid{
    display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-top:6px;
  }
  .patch-cell{display:flex;flex-direction:column;align-items:center;gap:6px;}
  .patch{
    width:54px;height:54px;border-radius:50%;
    display:flex;align-items:center;justify-content:center;
    border:2px dashed var(--line);background:var(--panel);
  }
  .patch svg{width:22px;height:22px;color:var(--cream-dim);opacity:.45;}
  .patch.earned{border-style:solid;border-color:var(--gold-dim);background:var(--panel-2);}
  .patch.earned svg{color:var(--gold);opacity:1;}
  .patch.earned.special{background:var(--gold);border-color:var(--gold);}
  .patch.earned.special svg{color:var(--black-ribbon);}
  .patch-label{
    font-family:var(--font-mono);font-size:9px;letter-spacing:.04em;
    text-transform:uppercase;color:var(--cream-dim);text-align:center;line-height:1.3;
  }
  .patch-cell.earned .patch-label{color:var(--cream);}

  /* ---------- formation timeline ---------- */
  .timeline{display:flex;flex-direction:column;}
  .tl-row{
    display:flex;align-items:center;gap:10px;
    padding:8px 0;border-bottom:1px solid var(--line-soft);
  }
  .tl-row:last-child{border-bottom:none;}
  .tl-check{
    width:20px;height:20px;border-radius:50%;flex:0 0 auto;
    border:1px solid var(--line);
    display:flex;align-items:center;justify-content:center;
  }
  .tl-check svg{width:12px;height:12px;color:var(--bg);}
  .tl-row.done .tl-check{background:var(--gold);border-color:var(--gold);}
  .tl-name{font-size:13px;color:var(--cream);flex:1;}
  .tl-row:not(.done) .tl-name{color:var(--cream-dim);}
  .tl-tag{
    font-family:var(--font-mono);font-size:9px;letter-spacing:.1em;
    text-transform:uppercase;color:var(--gold-dim);border:1px solid var(--line);
    border-radius:10px;padding:2px 7px;
  }

  /* ---------- turma list ---------- */
  .roster-row{
    display:flex;align-items:center;gap:12px;
    padding:10px;border:1px solid var(--line);border-radius:12px;
    background:var(--panel-2);margin-bottom:8px;cursor:pointer;
  }
  .roster-info{flex:1;min-width:0;}
  .roster-name{font-size:13px;color:var(--cream);font-weight:500;}
  .roster-sub{font-family:var(--font-mono);font-size:10px;color:var(--cream-dim);margin-top:2px;}
  .roster-right{text-align:right;flex:0 0 auto;}
  .roster-freq{font-family:var(--font-display);font-size:15px;color:var(--gold);}
  .roster-rank{font-family:var(--font-mono);font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--cream-dim);}
  .roster-expand{
    border-top:1px solid var(--line);margin-top:8px;padding-top:8px;
  }
  .badge-toggle-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;}
  .badge-toggle{
    display:flex;align-items:center;gap:8px;
    font-family:var(--font-mono);font-size:10px;color:var(--cream-dim);
    border:1px solid var(--line);border-radius:8px;padding:6px 8px;cursor:pointer;
  }
  .badge-toggle.on{color:var(--gold);border-color:var(--gold-dim);}
  .badge-toggle input{accent-color:var(--gold);}

  /* ---------- chamada ---------- */
  .pin-wrap{text-align:center;padding:40px 10px;}
  .pin-wrap .emblem{margin:0 auto 14px;}
  .pin-title{font-family:var(--font-display);font-size:16px;letter-spacing:.06em;text-transform:uppercase;margin-bottom:4px;}
  .pin-sub{font-family:var(--font-mono);font-size:11px;color:var(--cream-dim);margin-bottom:18px;}
  .check-row{
    display:flex;align-items:center;gap:10px;padding:8px 0;
    border-bottom:1px solid var(--line-soft);
  }
  .check-row:last-child{border-bottom:none;}
  .check-row input{width:18px;height:18px;accent-color:var(--gold);}
  .check-row .roster-name{font-size:13px;}
  .check-row .roster-sub{margin-top:1px;}

  /* ---------- broches catalog ---------- */
  .badge-cat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
  .badge-cat-card{
    background:var(--panel-2);border:1px solid var(--line);border-radius:12px;
    padding:12px;display:flex;flex-direction:column;align-items:center;gap:8px;text-align:center;
  }
  .badge-cat-card .patch{width:48px;height:48px;}
  .badge-cat-name{font-family:var(--font-display);font-size:12px;letter-spacing:.04em;text-transform:uppercase;color:var(--cream);}
  .badge-cat-count{font-family:var(--font-mono);font-size:10px;color:var(--gold-dim);}

  /* ---------- buttons ---------- */
  .btn{
    width:100%;background:var(--gold);color:var(--black-ribbon);
    border:none;border-radius:10px;padding:11px 14px;
    font-family:var(--font-display);font-size:13px;letter-spacing:.08em;
    text-transform:uppercase;cursor:pointer;
  }
  .btn:active{transform:scale(.99);}
  .btn.secondary{
    background:transparent;color:var(--gold);border:1px solid var(--gold-dim);
  }
  .btn.ghost{
    background:transparent;color:var(--cream-dim);border:1px solid var(--line);
    font-family:var(--font-mono);text-transform:none;letter-spacing:.02em;font-size:12px;
  }
  .toast{
    font-family:var(--font-mono);font-size:11px;color:var(--gold);
    text-align:center;margin-top:10px;
  }

  /* ---------- new class form ---------- */
  .form-stack{display:flex;flex-direction:column;gap:10px;}

  /* ---------- bottom nav ---------- */
  .nav{
    display:flex;border-top:1px solid var(--line);
    background:var(--panel-2);
  }
  .nav-btn{
    flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;
    padding:10px 4px 12px;background:none;border:none;color:var(--cream-dim);
    cursor:pointer;font-family:var(--font-mono);font-size:9px;letter-spacing:.1em;
    text-transform:uppercase;
  }
  .nav-btn svg{width:20px;height:20px;}
  .nav-btn.active{color:var(--gold);}

  .empty-note{
    font-family:var(--font-mono);font-size:11px;color:var(--cream-dim);
    text-align:center;padding:20px 10px;
  }
  ::-webkit-scrollbar{width:0;height:0;}
</style>
</head>
<body>
<div class="phone">
  <div class="header">
    <div class="emblem" id="emblem-slot"></div>
    <div class="header-text">
      <div class="eyebrow">UAADESAN · Painel de Campo</div>
      <div class="title">Projeto Discipuladores</div>
      <div class="subtitle" id="header-sub">carregando ficha...</div>
    </div>
  </div>
  <div class="view" id="view"></div>
  <div class="nav" id="nav"></div>
</div>

<script>
/* ============ ICONS ============ */
const ICONS = {

  check: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M5 13l4 4 10-10"/></svg>`,
  almas: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M12 2v20M5 8h14"/></svg>`,
  socorros: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="3"/><path d="M12 7v10M7 12h10" stroke-width="2.5" stroke-linecap="round"/></svg>`,
  missoes: `<svg viewBox="0 0 24 24" fill="currentColor"><rect x="3" y="9" width="5" height="12"/><rect x="9.5" y="4" width="5" height="17"/><rect x="16" y="12" width="5" height="9"/></svg>`,
  ebl: `<svg viewBox="0 0 24 24" fill="currentColor"><path d="M3 4h7a3 3 0 013 3v13a3 3 0 00-3-3H3z"/><path d="M21 4h-7a3 3 0 00-3 3v13a3 3 0 013-3h7z"/></svg>`,
  discipulador: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3 2 8l10 5 10-5-10-5z"/><path d="M6 10.5V16c0 1.5 2.5 3 6 3s6-1.5 6-3v-5.5"/></svg>`,
  musico: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="7" cy="17" r="3"/><circle cx="17" cy="15" r="3"/><path d="M10 17V5l10-2v12"/></svg>`,
  midia: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="7" width="18" height="13" rx="2"/><circle cx="12" cy="13.5" r="3.5"/><path d="M8 7l1.5-2h5L16 7"/></svg>`,
  dourado: `<svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2l2.9 6 6.6.6-5 4.4 1.5 6.5L12 16l-5.9 3.5L7.6 13l-5-4.4 6.6-.6z"/></svg>`,
  peconhentos: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12c2-4 5-6 9-6s7 2 9 6c-2 4-5 6-9 6s-7-2-9-6z"/><circle cx="9" cy="12" r="1"/></svg>`,

function normalize(str){
  return str.normalize('NFD').replace(/[\u0300-\u036f]/g,'').toLowerCase().trim().replace(/\s+/g,' ');
}
function compressImage(file, maxSize=200, quality=0.75){
  return new Promise((resolve)=>{
    const reader = new FileReader();
    reader.onload = e=>{
      const img = new Image();
      img.onload = ()=>{
        const canvas = document.createElement('canvas');
        let w = img.width, h = img.height;
        if(w>h){ if(w>maxSize){h=Math.round(h*maxSize/w);w=maxSize;} }
        else{ if(h>maxSize){w=Math.round(w*maxSize/h);h=maxSize;} }
        canvas.width=w; canvas.height=h;
        canvas.getContext('2d').drawImage(img,0,0,w,h);
        resolve(canvas.toDataURL('image/jpeg', quality));
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  });
}

}

/* ============ HELPERS ============ */
function allClasses(){ return DEFAULT_CLASSES.concat(db.classesExtra); }
function getStudent(id){ return STUDENTS.find(s=>s.id===id); }
function initials(name){ const p = name.trim().split(/\s+/); return ((p[0][0]||'')+(p[1]?p[1][0]:'')).toUpperCase(); }

function sessionsCount(student){
  return DEFAULT_CLASSES.filter(c=>c.kind==='sessao').filter(c=>(db.attendance[c.id]||[]).includes(student.id)).length;
}
function mppDone(student){ return (db.attendance['mpp']||[]).includes(student.id); }
function rankFor(student){
  const sc = sessionsCount(student);
  if(sc>=14) return RANKS[2];
  if(sc>=7) return RANKS[1];
  return RANKS[0];
}
function realizedClasses(){ return allClasses().filter(c=> db.attendance.hasOwnProperty(c.id)); }
function frequencyFor(student){
  const real = realizedClasses();
  if(real.length===0) return {pct:0, present:0, total:0};
  const present = real.filter(c=> (db.attendance[c.id]||[]).includes(student.id)).length;
  return {pct: Math.round((present/real.length)*100), present, total: real.length};
}
function earnedBadges(student){
  const set = new Set();
  (db.manualBadges[student.id]||[]).forEach(b=>set.add(b));
  if(student.funcoes.includes('Músico')) set.add('musico');
  if(student.funcoes.includes('Mídia')) set.add('midia');
  allClasses().forEach(c=>{ if(c.badge && (db.attendance[c.id]||[]).includes(student.id)) set.add(c.badge); });
  if(sessionsCount(student)>=14) set.add('discipulador');
  return set;
}
function ribbonHTML(rankLevel){
  let html = '<div class="ribbon">';
  for(let i=0;i<3;i++){
    const filled = i<=rankLevel;
    const isStar = filled && rankLevel===2 && i===2;
    html += `<div class="ribbon-seg ${filled?'filled':''} ${isStar?'star':''}"></div>`;
  }
  html += '</div>';
  return html;
}

function tryFichaLogin(){
  const codigo = document.getElementById('ficha-codigo').value.trim();
  const matches = STUDENTS.filter(s=> s.codigo===codigo);
  if(matches.length===1){ selectFichaCandidate(matches[0].id); return; }
  if(matches.length>1){ state.fichaCandidates = matches; state.loginError=''; render(); return; }
  const comando = COMANDOS.find(c=> c.codigo===codigo);
  if(comando){
    state.isAdmin = true; state.adminRole = 'Comandante'; state.adminName = comando.name.split(' ')[0];
    state.studentId = null; state.comandoOnly = true; state.loginError=''; render(); return;
  }
  state.loginError = 'Código não encontrado. Verifique os 4 últimos dígitos do seu CPF.'; render();
}
function selectFichaCandidate(id){
  const student = getStudent(id);
  state.studentId = id;
  if(student.funcoes.includes('Líder')){
    state.isAdmin = true; state.adminRole = 'Subcomandante'; state.adminName = student.name.split(' ')[0];
  }
  state.fichaCandidates = null; state.loginError=''; state.comandoOnly = false; render();
}

  document.getElementById('header-sub').textContent = `Turma · ${STUDENTS.length} discípulos`;
  const term = state.search.toLowerCase();
  const list = STUDENTS
    .filter(s=>s.name.toLowerCase().includes(term))
    .map(s=>({s, rank:rankFor(s), badgeCount:earnedBadges(s).size}))
    .sort((a,b)=> b.rank.level - a.rank.level || a.s.name.localeCompare(b.s.name));

  const rows = list.map(({s,rank,badgeCount})=>{
    const open = state.turmaOpen===s.id;
    let expand = '';
    if(open && state.isAdmin){
      const earned = earnedBadges(s);
      const toggles = MANUAL_BADGE_IDS.map(bid=>{
        const b = BADGES.find(x=>x.id===bid);
        const on = earned.has(bid);
        return `<label class="badge-toggle ${on?'on':''}">
          <input type="checkbox" ${on?'checked':''} onchange="toggleManualBadge('${s.id}','${bid}')">
          ${b.name}
        </label>`;
      }).join('');
      expand = `<div class="roster-expand">
        <div class="badge-toggle-grid">${toggles}</div>
        <button class="btn ghost" style="margin-top:10px;" onclick="viewStudentFicha('${s.id}')">Ver ficha completa</button>
      </div>`;
    } else if(open){
      const earned = [...earnedBadges(s)].map(id=>BADGES.find(b=>b.id===id)?.name).filter(Boolean);
      expand = `<div class="roster-expand" style="font-family:var(--font-mono);font-size:10px;color:var(--cream-dim);">
        ${earned.length? 'Broches: '+earned.join(', ') : 'Nenhum broche ainda'}
      </div>`;
    }
    return `<div>
      <div class="roster-row" onclick="state.turmaOpen = state.turmaOpen==='${s.id}'?null:'${s.id}'; render()">
        ${avatarHTML(s,'sm')}
        <div class="roster-info">
          <div class="roster-name">${s.name}</div>
          <div class="roster-sub">Cong. ${s.congregacao} · área ${s.area} · ${rank.name}</div>
        </div>
        <div class="roster-right">
          <div class="roster-freq">${badgeCount}</div>
          <div class="roster-rank">broches</div>
        </div>
      </div>
      ${open?`<div class="card" style="margin-top:-6px;border-top:none;border-radius:0 0 12px 12px;">${expand}</div>`:''}
    </div>`;
  }).join('');

  document.getElementById('view').innerHTML = `
    <input class="field" placeholder="Buscar discípulo..." value="${state.search}" oninput="state.search=this.value; render()">
    <div class="section-label">${list.length} resultado(s)</div>
    ${rows || '<div class="empty-note">Nenhum discípulo encontrado.</div>'}
    ${!state.isAdmin?'<div class="empty-note">Acesso de comandante necessário para gerenciar broches manuais. Entre na aba Chamada.</div>':''}
  `;
}

/* ============ RENDER: CHAMADA (admin) ============ */
function renderChamada(){
  document.getElementById('header-sub').textContent = 'Chamada · acesso restrito';
  if(!state.isAdmin){
    document.getElementById('view').innerHTML = `
      <div class="pin-wrap">
        <img src="${LOGO_SHIELD}" alt="Brasão UAADESAN - Exército de Judá" style="width:92px;margin:0 auto 14px;display:block;object-fit:contain;">
        <div class="pin-title">Acesso Comando</div>
        <div class="pin-sub">Informe os 4 últimos dígitos do seu CPF para registrar a chamada e os broches.</div>
        <label class="field-label" style="text-align:left;">Últimos 4 dígitos do CPF</label>
        <input class="field" id="cmd-codigo" type="password" inputmode="numeric" maxlength="4" placeholder="0000" style="text-align:center;margin-bottom:10px;" autofocus>
        <button class="btn" onclick="tryAdminLogin()">Entrar</button>
        <div class="toast" id="pin-error" style="color:var(--red);"></div>
      </div>`;
    return;
  }

  const classes = allClasses();
  const currentClassId = state.chamadaClass || classes[0].id;
  state.chamadaClass = currentClassId;
  const term = state.search.toLowerCase();
  const present = new Set(db.attendance[currentClassId] || []);

  const classOptions = classes.map(c=>{
    const tag = c.kind==='intro'?' · intro':c.kind==='sessao'?'':' · temática';
    const realized = db.attendance.hasOwnProperty(c.id)?' ✓':'';
    return `<option value="${c.id}" ${c.id===currentClassId?'selected':''}>${c.name}${tag}${realized}</option>`;
  }).join('');

  const rows = STUDENTS.filter(s=>s.name.toLowerCase().includes(term)).map(s=>{
    const checked = present.has(s.id);
    return `<label class="check-row">
      <input type="checkbox" data-student="${s.id}" ${checked?'checked':''}>
      ${avatarHTML(s,'sm')}
      <div class="roster-info">
        <div class="roster-name">${s.name}</div>
        <div class="roster-sub">Cong. ${s.congregacao} · área ${s.area}</div>
      </div>
    </label>`;
  }).join('');

  const badgeOptions = BADGES.map(b=>`<option value="${b.id}">${b.name}</option>`).join('');

  document.getElementById('view').innerHTML = `
    <div class="card" style="display:flex;justify-content:space-between;align-items:center;">
      <div>
        <div class="dossier-meta" style="margin-top:0;">Sessão de acesso ativa</div>
        <div class="ribbon-rank" style="margin-top:2px;">${state.adminRole || 'Comando'} ${state.adminName || ''}</div>
      </div>
      <button class="btn ghost" onclick="state.isAdmin=false; state.adminName=''; state.adminRole=''; state.comandoOnly=false; render()">Sair</button>
    </div>

    <div class="section-label">Selecionar aula</div>
    <select class="field" onchange="state.chamadaClass=this.value; state.renamingClass=false; render()">${classOptions}</select>
    <div style="display:flex;gap:8px;margin-top:8px;">
      <button class="btn ghost" style="flex:1;padding:8px;" onclick="state.renamingClass=!state.renamingClass; render()">✏️ Renomear</button>
      ${currentClassId && db.classesExtra.find(c=>c.id===currentClassId) ? `<button class="btn ghost" style="flex:1;padding:8px;color:var(--red);border-color:var(--red);" onclick="deleteClass('${currentClassId}')">🗑 Excluir</button>` : ''}
    </div>
    ${state.renamingClass ? `
      <div class="card" style="margin-top:10px;">
        <label class="field-label">Novo nome da aula</label>
        <input class="field" id="rename-class-input" value="${allClasses().find(c=>c.id===currentClassId)?.name || ''}" style="margin-bottom:10px;">
        <button class="btn secondary" onclick="renameClass('${currentClassId}')">Salvar novo nome</button>
        <div class="toast" id="rename-toast"></div>
      </div>` : ''}

    <div class="section-label">Lista de presença</div>
    <input class="field" placeholder="Buscar discípulo..." value="${state.search}" oninput="state.search=this.value; render()">
    <div style="display:flex;gap:8px;margin-top:10px;">
      <button class="btn secondary" style="flex:1;padding:8px;" onclick="markAll(true)">✓ Todos presentes</button>
      <button class="btn ghost" style="flex:1;padding:8px;" onclick="markAll(false)">✗ Desmarcar todos</button>
    </div>
    <div class="card" style="margin-top:10px;">${rows}</div>
    <button class="btn" style="margin-top:12px;" onclick="saveChamada()">Salvar chamada</button>
    <div class="toast" id="chamada-toast"></div>

    <div class="section-label">Cadastrar nova aula</div>
    <div class="card">
      <div class="form-stack">
        <div>
          <label class="field-label">Nome da aula / formação</label>
          <input class="field" id="new-class-name" placeholder="Ex: Zoológico - Animais Peçonhentos">
        </div>
        <div>
          <label class="field-label">Broche vinculado (opcional)</label>
          <select class="field" id="new-class-badge">
            <option value="">Nenhum</option>
            ${badgeOptions}
          </select>
        </div>
        <button class="btn secondary" onclick="addClass()">Adicionar aula</button>
      </div>
    </div>
  `;
}
async function tryAdminLogin(){
  const codigo = document.getElementById('cmd-codigo').value.trim();
  const comando = COMANDOS.find(c=> c.codigo===codigo);
  if(comando){
    state.isAdmin = true; state.adminRole = 'Comandante'; state.adminName = comando.name.split(' ')[0];
    state.search=''; render(); return;
  }
  const matches = STUDENTS.filter(s=> s.funcoes.includes('Líder') && s.codigo===codigo);
  if(matches.length>=1){
    state.isAdmin = true; state.adminRole = 'Subcomandante'; state.adminName = matches[0].name.split(' ')[0];
    state.search=''; render(); return;
  }
  document.getElementById('pin-error').textContent = 'Código incorreto. Verifique os 4 últimos dígitos do seu CPF.';
}
async function renameClass(classId){
  const newName = document.getElementById('rename-class-input').value.trim();
  if(!newName) return;
  const idx = db.classesExtra.findIndex(c=>c.id===classId);
  if(idx>=0){
    db.classesExtra[idx].name = newName;
  } else {
    const def = DEFAULT_CLASSES.find(c=>c.id===classId);
    if(def){
      const existing = db.classesExtra.find(c=>c.id===classId+'_renamed');
      if(existing){ existing.name = newName; }
      else { db.classesExtra.push({...def, id:classId, name:newName, _renamed:true}); }
      db.classesExtra = db.classesExtra.filter(c=> !(c.id===classId && !c._renamed));
    }
  }
  await saveClassesExtra();
  state.renamingClass = false;
  const toast = document.getElementById('rename-toast');
  if(toast) toast.textContent = 'Nome atualizado!';
  render();
}
async function deleteClass(classId){
  if(!confirm('Excluir esta aula? Os registros de presença serão mantidos.')) return;
  db.classesExtra = db.classesExtra.filter(c=>c.id!==classId);
  delete db.attendance[classId];
  await saveClassesExtra();
  await saveAttendance();
  state.chamadaClass = null;
  state.renamingClass = false;
  render();
}
function markAll(checked){
  document.querySelectorAll('[data-student]').forEach(el=>el.checked=checked);
}
async function saveChamada(){
  const classId = state.chamadaClass;
  const checked = [...document.querySelectorAll('[data-student]')].filter(el=>el.checked).map(el=>el.dataset.student);
  db.attendance[classId] = checked;
  await saveAttendance();
  const toast = document.getElementById('chamada-toast');
  if(toast) toast.textContent = 'Chamada salva. ' + checked.length + ' presentes.';
  render();
}
async function addClass(){
  const name = document.getElementById('new-class-name').value.trim();
  if(!name) return;
  const badge = document.getElementById('new-class-badge').value || null;
  const id = 'c' + Date.now();
  db.classesExtra.push({id, name, kind:'tematica', badge});
  await saveClassesExtra();
  state.chamadaClass = id;
  render();
}
async function toggleManualBadge(studentId, badgeId){
  const set = new Set(db.manualBadges[studentId] || []);
  if(set.has(badgeId)) set.delete(badgeId); else set.add(badgeId);
  db.manualBadges[studentId] = [...set];
  await saveManualBadges();
  render();
}

/* ============ RENDER: HISTÓRICO ============ */
function renderHistorico(){
  document.getElementById('header-sub').textContent = 'Histórico de aulas';
  const realized = allClasses().filter(c=> db.attendance.hasOwnProperty(c.id));
  const pending = allClasses().filter(c=> !db.attendance.hasOwnProperty(c.id));

  if(realized.length===0){
    document.getElementById('view').innerHTML = `
      <div class="empty-note" style="margin-top:40px;">Nenhuma aula registrada ainda.<br>Use a aba Chamada para registrar a primeira.</div>`;
    return;
  }

  const realizedRows = realized.map(c=>{
    const presentes = (db.attendance[c.id]||[]);
    const tag = c.kind==='intro'?'Intro':c.kind==='tematica'?'Temática':'Sessão';
    return `<div class="card" style="margin-bottom:10px;">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">
        <div>
          <div style="font-family:var(--font-display);font-size:14px;letter-spacing:.04em;text-transform:uppercase;">${c.name}</div>
          <div style="font-family:var(--font-mono);font-size:10px;color:var(--gold-dim);margin-top:2px;">${tag}</div>
        </div>
        <div style="text-align:right;">
          <div style="font-family:var(--font-display);font-size:18px;color:var(--gold);">${presentes.length}</div>
          <div style="font-family:var(--font-mono);font-size:9px;color:var(--cream-dim);">presentes</div>
        </div>
      </div>
      <div style="font-family:var(--font-mono);font-size:10px;color:var(--cream-dim);line-height:1.7;">
        ${presentes.length>0
          ? presentes.map(id=>{ const s=getStudent(id); return s?s.name.split(' ')[0]+' '+s.name.split(' ')[1]:''; }).filter(Boolean).join(' · ')
          : 'Nenhum presente registrado'}
      </div>
    </div>`;
  }).join('');

  document.getElementById('view').innerHTML = `
    <div class="section-label">${realized.length} aula(s) realizada(s)</div>
    ${realizedRows}
    ${pending.length>0?`
      <div class="section-label">${pending.length} aula(s) pendente(s)</div>
      <div class="card">
        <div class="timeline">
          ${pending.map(c=>`<div class="tl-row">
            <div class="tl-check"></div>
            <div class="tl-name">${c.name}</div>
          </div>`).join('')}
        </div>
      </div>`:''}
  `;
}

async function handlePhotoUpload(event, studentId){
  const file = event.target.files[0];
  if(!file) return;
  const compressed = await compressImage(file, 300, 0.8);
  db.photos[studentId] = compressed;
  await savePhotos();
  render();
}

/* ============ MAIN RENDER ============ */
function render(){
  renderShell();
  if(state.tab==='ficha') renderFicha();
  else if(state.tab==='turma') renderTurma();
  else if(state.tab==='chamada') renderChamada();
  else if(state.tab==='historico') renderHistorico();
}

render();
startSync();

if('serviceWorker' in navigator){
  navigator.serviceWorker.register('/Portal-Discipulador/sw.js')
    .then(()=>console.log('SW registrado'))
    .catch(e=>console.error('SW erro:', e));
}
</script>
</body>
</html>
